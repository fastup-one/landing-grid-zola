# Hardened static-file server for the Landing Grid build.
# Addresses findings OPS-06 (headers/banner/gzip) and SEC-05 (CSP + headers).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Do not advertise the nginx version (OPS-06).
    server_tokens off;

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/rss+xml font/woff2;

    # Security headers on every response (SEC-05). CSP is self-only: our JS is
    # an external file (script-src 'self'); style-src keeps 'unsafe-inline' for
    # the data-driven tile color attributes (those colors are validated at build
    # time, finding SEC-04).
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; form-action 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Long-cache static assets. Use only `expires` here (not add_header): an
    # add_header in a location block would cancel the inherited server-level
    # security headers, so assets would ship without CSP/nosniff. `expires` sets
    # Cache-Control without triggering that override.
    location ~* \.(css|js|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
