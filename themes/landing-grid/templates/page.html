{% extends "base.html" %}

{# Renders a content/*.md page in a readable card instead of Zola's built-in
   "no template" placeholder (finding TPL-01). Suppresses the grid hero. #}
{% block hero %}{% endblock hero %}

{% block content %}
<article class="prose prose-invert lg:prose-lg max-w-3xl mx-auto glass rounded-3xl p-8 lg:p-12">
    <h1>{{ page.title }}</h1>
    {{ page.content | safe }}
</article>
{% endblock content %}
