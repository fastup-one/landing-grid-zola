name: Deploy to GitHub Pages

# Builds the site and publishes it to the gh-pages branch (the Pages source).
# Actions are pinned to a full commit SHA (finding SUP-02). Least-privilege:
# contents:write is the only scope needed to push the built site to gh-pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  ZOLA_VERSION: "0.22.1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
      - name: Install Zola
        run: |
          curl -sSfL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | sudo tar -xz -C /usr/local/bin
      - run: npm ci
      - run: npm run build-css-prod
      - name: Build site
        run: zola build --minify
      - name: Publish to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch public/.nojekyll
          cd public
          git init -q
          git checkout -q -b gh-pages
          git config user.name "Anibal Aguila"
          git config user.email "aa@fastup.one"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA} to Pages"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
