name: Release

# Versioning discipline (finding REL-01): a tag push (vX.Y.Z) must match the
# version in package.json, so "what's released" is unambiguous.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          echo "tag=$tag package.json=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag $tag does not match package.json version $pkg" >&2
            exit 1
          fi
