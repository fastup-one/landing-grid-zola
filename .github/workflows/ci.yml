name: CI gates

# Every push and PR runs the full gate battery. A branch-protection rule should
# make the final `gate` job a required status check (see docs/branch-protection.md).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZOLA_VERSION: "0.22.1"
  NODE_VERSION: "22"

jobs:
  static:
    name: Build + static gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install Zola
        run: |
          curl -sSfL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | sudo tar -xz -C /usr/local/bin
      - run: npm ci
      - run: make build
      - run: make check
      - run: make htmlvalidate
      - run: make links
      - run: make invariants

  a11y:
    name: Accessibility (pa11y)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
        id: chrome
      - name: Install Zola
        run: |
          curl -sSfL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | sudo tar -xz -C /usr/local/bin
      - run: npm ci
      - name: pa11y
        run: make pa11y CHROMIUM=${{ steps.chrome.outputs.chrome-path }}

  behavior:
    name: Behavior (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install Zola
        run: |
          curl -sSfL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | sudo tar -xz -C /usr/local/bin
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Playwright
        run: make playwright CHROMIUM=

  perf:
    name: Performance / SEO (Lighthouse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2
        id: chrome
      - name: Install Zola
        run: |
          curl -sSfL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | sudo tar -xz -C /usr/local/bin
      - run: npm ci
      - name: Lighthouse
        run: make lighthouse CHROMIUM=${{ steps.chrome.outputs.chrome-path }}

  supply-chain:
    name: Supply chain (actionlint + gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - run: make tools
      - run: make lint-actions
      - run: make gitleaks

  docker:
    name: Container (hadolint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - run: make tools
      - run: make hadolint
      - name: Build image
        run: docker build -t landing-grid:ci .
      - name: Container smoke test (served page is styled, assets load)
        run: |
          # Build with a production base_url, then serve/access via a DIFFERENT
          # host alias (127.0.0.1) — this is exactly the case that shipped an
          # unstyled page. Assets must be root-relative and load same-origin.
          docker run -d --name lg -p 127.0.0.1:8090:80 landing-grid:ci
          for _ in $(seq 1 20); do
            if curl -sf -o /dev/null http://127.0.0.1:8090/; then break; fi
            sleep 1
          done
          html="$(curl -sf http://127.0.0.1:8090/)"
          echo "$html" | grep -q 'href=/css/tailwind.css' || { echo "::error::stylesheet is not root-relative"; exit 1; }
          echo "$html" | grep -q 'src=/js/app.js' || { echo "::error::script is not root-relative"; exit 1; }
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8090/css/tailwind.css)" = 200
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8090/js/app.js)" = 200
          curl -sI http://127.0.0.1:8090/ | grep -qi 'Content-Security-Policy' || { echo "::error::no CSP header"; exit 1; }
          docker rm -f lg

  coverage:
    name: Coverage matrix (45/45)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: make coverage

  gate:
    name: All gates green
    runs-on: ubuntu-latest
    needs: [static, a11y, behavior, perf, supply-chain, docker, coverage]
    steps:
      - run: echo "✅ every gate passed"
